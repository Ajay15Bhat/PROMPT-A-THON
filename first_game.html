<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mario's IEEE Quest – Paper Chase 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1b2a;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; touch-action: none;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* ── PUZZLE OVERLAY ── */
        #puzzle-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.78); z-index: 200;
            justify-content: center; align-items: center;
        }
        #puzzle-overlay.active { display: flex; }
        .puzzle-box {
            background: linear-gradient(135deg, #0d1b7a 0%, #003f8a 100%);
            border: 3px solid #ffd700; border-radius: 14px;
            padding: 28px 32px; max-width: 520px; width: 92%;
            color: #fff; text-align: center; box-shadow: 0 0 40px rgba(0,100,255,0.5);
        }
        .ieee-badge {
            display: inline-block; background: #ffd700; color: #0d1b7a;
            padding: 4px 14px; border-radius: 20px;
            font-size: 0.78em; font-weight: 900; margin-bottom: 14px;
            letter-spacing: 0.03em;
        }
        .puzzle-box h2 { color: #ffd700; font-size: 1.1em; margin-bottom: 12px; }
        .puzzle-box p  { margin-bottom: 20px; line-height: 1.65; font-size: 0.97em; white-space: pre-line; }
        .puzzle-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .puzzle-option {
            background: #112080; border: 2px solid #3a5bbf; color: #fff;
            padding: 13px 8px; border-radius: 9px; cursor: pointer;
            font-size: 1em; font-family: 'Courier New', monospace;
            transition: border-color 0.15s, background 0.15s;
        }
        .puzzle-option:hover  { background: #1a2e9e; border-color: #ffd700; }
        .puzzle-option.correct { background: #1b5e20; border-color: #66bb6a; }
        .puzzle-option.wrong   { background: #7f0000; border-color: #ef5350; }
        .puzzle-feedback { font-size: 0.9em; min-height: 22px; margin-bottom: 10px; font-weight: bold; }
        .puzzle-continue {
            display: none; background: #ffd700; color: #0d1b7a;
            border: none; padding: 12px 30px; border-radius: 9px;
            cursor: pointer; font-size: 1em; font-weight: 900;
            font-family: 'Courier New', monospace; transition: background 0.15s;
        }
        .puzzle-continue:hover { background: #ffe566; }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="puzzle-overlay">
  <div class="puzzle-box">
    <div class="ieee-badge">🎓 IEEE CS 80th Anniversary Challenge</div>
    <h2 id="puzzle-title"></h2>
    <p  id="puzzle-question"></p>
    <div class="puzzle-options" id="puzzle-options"></div>
    <div class="puzzle-feedback" id="puzzle-feedback"></div>
    <button class="puzzle-continue" id="puzzle-continue" onclick="closePuzzle()">Continue Quest →</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const CONFIG = {
    gravity       : 0.55,
    groundHeight  : 0,
    baseSpeed     : 4.5,
    jumpForce     : -13,
    playerSpeed   : 5,
    playerLimitX  : 0,
    totalPages    : 20,
    gameTime      : 90,          // seconds
    puzzle1Dist   : 5000,
    puzzle2Dist   : 11000,
    confDist      : 17000,
    speedRamp     : 0.012,       // speed added per elapsed second
};

// ═══════════════════════════════════════════════════════
//  CANVAS & CONTEXT
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    CONFIG.groundHeight = canvas.height * 0.22;
    CONFIG.playerLimitX = canvas.width  * 0.45;
    if (player && player.isGrounded)
        player.y = canvas.height - CONFIG.groundHeight - player.height;
}
window.addEventListener('resize', resizeCanvas);

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let gameState      = 'start';
let timer          = CONFIG.gameTime;
let lastTime       = null;
let pagesCollected = 0;
let pagesSpawned   = 0;
let gameDistance   = 0;
let puzzle1Done    = false;
let puzzle2Done    = false;
let currentPuzzle  = 0;
let puzzleAnswered = false;
let frameCount     = 0;
let currentSpeed   = CONFIG.baseSpeed;
let confActivated  = false;
let confReached    = false;

// ═══════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════
const keys = { Space: false, ArrowUp: false, ArrowLeft: false, ArrowRight: false };

// ═══════════════════════════════════════════════════════
//  PUZZLES
// ═══════════════════════════════════════════════════════
const PUZZLES = [
  {
    title    : '🔍 Puzzle 1 — IEEE History',
    question : 'IEEE Computer Society celebrates its 80th anniversary in 2026!\n\nIn which year was IEEE Computer Society founded?',
    options  : ['1944', '1946', '1951', '1963'],
    answer   : 1,
    bonusTime: 15,
    bonusPage: 0,
    reward   : '✅ +15 seconds added to the clock!',
  },
  {
    title    : '💻 Puzzle 2 — Binary Decode',
    question : 'Computing runs on binary — the language of machines!\n\nThe IEEE CS founding year encoded in binary is:\n\n11110011010\n\nWhat year does this decode to?',
    options  : ['1944', '1952', '1946', '1948'],
    answer   : 2,
    bonusTime: 20,
    bonusPage: 2,
    reward   : '✅ +20 seconds & +2 bonus pages!',
  },
];

// ═══════════════════════════════════════════════════════
//  UTILITY
// ═══════════════════════════════════════════════════════
function rrect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function overlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
}

// ═══════════════════════════════════════════════════════
//  PARTICLE
// ═══════════════════════════════════════════════════════
class Particle {
    constructor(x, y, vx, vy, size, color) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.size = Math.max(1, size); this.color = color;
        this.alpha = 1; this.gone = false;
    }
    update() {
        this.x += this.vx - currentSpeed;
        this.y += this.vy; this.vy += 0.1;
        this.alpha -= 0.032; this.size *= 0.96;
        if (this.alpha <= 0 || this.size < 0.2) this.gone = true;
    }
    draw() {
        ctx.save(); ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill(); ctx.restore();
    }
}

// ═══════════════════════════════════════════════════════
//  FLOATING TEXT
// ═══════════════════════════════════════════════════════
class FloatText {
    constructor(x, y, text, color) {
        this.x = x; this.y = y; this.text = text; this.color = color;
        this.alpha = 1; this.vy = -1.8; this.gone = false;
    }
    update() {
        this.y += this.vy; this.x -= currentSpeed * 0.5;
        this.alpha -= 0.016;
        if (this.alpha <= 0) this.gone = true;
    }
    draw() {
        ctx.save(); ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.fillStyle = this.color;
        ctx.font = 'bold 17px Courier New'; ctx.textAlign = 'center';
        ctx.fillText(this.text, this.x, this.y); ctx.restore();
    }
}

// ═══════════════════════════════════════════════════════
//  PLAYER (Mario)
// ═══════════════════════════════════════════════════════
class Player {
    constructor() {
        this.width  = 32; this.height = 42;
        this.x = Math.min(130, canvas.width * 0.12);
        this.y = canvas.height - CONFIG.groundHeight - this.height;
        this.vy = 0; this.isGrounded = true;
        this.invTimer = 0;          // brief invincibility after hit
    }
    getBounds() { return { x: this.x+4, y: this.y+4, w: this.width-8, h: this.height-4 }; }
    update() {
        this.vy += CONFIG.gravity;
        this.y  += this.vy;
        if (this.invTimer > 0) this.invTimer--;

        const groundY = canvas.height - CONFIG.groundHeight;
        if (this.y + this.height >= groundY) {
            if (!this.isGrounded) {
                for (let i = 0; i < 8; i++)
                    particles.push(new Particle(
                        this.x + this.width/2 + (Math.random()*20-10), groundY,
                        (Math.random()-0.5)*3, -Math.random()*2-1,
                        Math.random()*3+3, 'rgba(200,220,255,0.7)'));
            }
            this.y = groundY - this.height;
            this.vy = 0; this.isGrounded = true;
        } else { this.isGrounded = false; }

        if ((keys.Space || keys.ArrowUp) && this.isGrounded) {
            this.vy = CONFIG.jumpForce; this.isGrounded = false;
            for (let i = 0; i < 6; i++)
                particles.push(new Particle(
                    this.x + this.width/2 + (Math.random()*16-8), groundY,
                    -Math.random()*2-1, -Math.random()*2,
                    Math.random()*3+2, 'rgba(200,220,255,0.6)'));
        }
        if (this.isGrounded && frameCount % 8 === 0)
            particles.push(new Particle(this.x+10, groundY,
                -1-Math.random()*2, -Math.random()-0.5,
                Math.random()*3+2, 'rgba(180,200,255,0.45)'));

        if (keys.ArrowLeft)  this.x -= CONFIG.playerSpeed;
        if (keys.ArrowRight) this.x += CONFIG.playerSpeed;
        if (this.x < 0) this.x = 0;
        if (this.x + this.width > CONFIG.playerLimitX)
            this.x = CONFIG.playerLimitX - this.width;
    }
    draw() {
        // Flash when invincible
        if (this.invTimer > 0 && Math.floor(this.invTimer / 4) % 2 === 0) return;

        ctx.save(); ctx.translate(this.x, this.y);
        const bounce = this.isGrounded ? Math.abs(Math.sin(frameCount*0.2))*2 : 0;
        ctx.translate(0, -bounce);

        const u = this.width/12, v = this.height/16;
        const R='#e52521', BL='#0043bb', P='#ffcca6', BR='#5c3a21', Y='#fdf104';

        // Hat
        ctx.fillStyle = R;
        ctx.fillRect(3*u, 0,    5*u, 2*v);
        ctx.fillRect(2*u, 2*v,  9*u, 1*v);
        // Hair
        ctx.fillStyle = BR;
        ctx.fillRect(2*u, 3*v,  3*u, 3*v);
        ctx.fillRect(1*u, 4*v,  1*u, 3*v);
        // Face
        ctx.fillStyle = P;
        ctx.fillRect(5*u, 3*v,  4*u, 4*v);
        ctx.fillRect(9*u, 4*v,  2*u, 2*v);
        ctx.fillRect(3*u, 6*v,  6*u, 1*v);
        ctx.fillStyle = BR;
        ctx.fillRect(7*u, 3*v,  1*u, 2*v);
        ctx.fillRect(7*u, 5*v,  4*u, 1*v);
        // Body
        ctx.fillStyle = R;
        ctx.fillRect(2*u, 7*v,  3*u, 4*v);
        ctx.fillRect(7*u, 7*v,  3*u, 4*v);
        ctx.fillRect(4*u, 7*v,  4*u, 2*v);
        ctx.fillStyle = BL;
        ctx.fillRect(4*u, 9*v,  4*u, 4*v);
        ctx.fillRect(3*u, 8*v,  1*u, 3*v);
        ctx.fillRect(8*u, 8*v,  1*u, 3*v);
        ctx.fillStyle = Y;
        ctx.fillRect(3*u, 10*v, 1*u, 1*v);
        ctx.fillRect(8*u, 10*v, 1*u, 1*v);
        // Hands
        ctx.fillStyle = P;
        ctx.fillRect(1*u, 9*v,  2*u, 2*v);
        ctx.fillRect(9*u, 9*v,  2*u, 2*v);
        // Legs
        ctx.fillStyle = BR;
        const stride = this.isGrounded ? Math.sin(frameCount*0.2)*2 : 2;
        ctx.fillRect((3-stride)*u, 13*v, 3*u, 2*v);
        ctx.fillRect((6+stride)*u, 13*v, 3*u, 2*v);

        ctx.restore();
    }
}

// ═══════════════════════════════════════════════════════
//  PAGE COLLECTIBLE
// ═══════════════════════════════════════════════════════
class Page {
    constructor() {
        this.width  = 26; this.height = 34;
        this.x = canvas.width + 60 + Math.random()*120;
        this.baseY = canvas.height - CONFIG.groundHeight - 70 - Math.random()*55;
        this.y = this.baseY;
        this.phase = Math.random()*Math.PI*2;
        this.gone  = false;
    }
    getBounds() { return { x:this.x, y:this.y, w:this.width, h:this.height }; }
    update() {
        this.x -= currentSpeed;
        this.y  = this.baseY + Math.sin(frameCount*0.045 + this.phase)*9;
        if (this.x + this.width < 0) this.gone = true;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x + this.width/2, this.y + this.height/2);
        ctx.rotate(Math.sin(frameCount*0.028 + this.phase)*0.11);

        // Glow
        ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 14;
        // Paper body
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
        ctx.strokeStyle = '#ccd'; ctx.lineWidth = 1;
        ctx.strokeRect(-this.width/2, -this.height/2, this.width, this.height);
        // Lines
        ctx.strokeStyle = '#9aade0'; ctx.lineWidth = 1.2;
        for (let i = 0; i < 5; i++) {
            const ly = -this.height/2 + 6 + i*5;
            ctx.beginPath();
            ctx.moveTo(-this.width/2+3, ly);
            ctx.lineTo( this.width/2-3, ly);
            ctx.stroke();
        }
        // IEEE stamp
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#0043bb';
        ctx.font = 'bold 5px Courier New'; ctx.textAlign = 'center';
        ctx.fillText('IEEE', 0, this.height/2-5);
        ctx.restore();
    }
}

// ═══════════════════════════════════════════════════════
//  OBSTACLE
// ═══════════════════════════════════════════════════════
class Obstacle {
    constructor(type) {
        this.type = type;
        this.groundY = canvas.height - CONFIG.groundHeight;
        this.gone = false;

        if (type === 'laptop')   { this.width=52; this.height=38; }
        if (type === 'cable')    { this.width=74; this.height=22; }
        if (type === 'reviewer') { this.width=46; this.height=58; }

        this.x = canvas.width + 60;
        this.y = this.groundY - this.height;

        if (type === 'reviewer') {
            this.floatBaseY = this.groundY - 110 - Math.random()*35;
            this.phase = Math.random()*Math.PI*2;
        }
    }
    getBounds() { return { x:this.x+5, y:this.y+5, w:this.width-10, h:this.height-10 }; }
    update() {
        this.x -= currentSpeed;
        if (this.type === 'reviewer')
            this.y = this.floatBaseY + Math.sin(frameCount*0.04+this.phase)*14;
        if (this.x + this.width < 0) this.gone = true;
    }

    drawLaptop() {
        const gY = this.groundY;
        ctx.save(); ctx.translate(this.x, gY - this.height);
        ctx.fillStyle = '#636e72';
        ctx.fillRect(0, 16, this.width, 22);          // base
        ctx.fillStyle = '#2d3436';                     // screen casing
        ctx.beginPath();
        ctx.moveTo(6, 16); ctx.lineTo(46, 16);
        ctx.lineTo(41, 0); ctx.lineTo(11, 0);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#c0392b';                     // dead screen
        ctx.fillRect(13, 2, 26, 12);
        ctx.fillStyle = '#ff6b6b'; ctx.font='bold 7px Courier New';
        ctx.textAlign='center'; ctx.fillText('ERROR', 26, 10);
        ctx.fillStyle='#b2bec3';                       // keys
        for (let r=0;r<2;r++) for(let c=0;c<6;c++)
            ctx.fillRect(4+c*8, 19+r*6, 6,4);
        ctx.restore();
    }
    drawCable() {
        const gY = this.groundY - 12;
        ctx.save(); ctx.translate(this.x, gY);
        ctx.strokeStyle = '#a29bfe'; ctx.lineWidth = 4; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(0,10);
        for (let i=0; i<=this.width; i+=10)
            ctx.lineTo(i, i%20<10 ? 10 : 2);
        ctx.stroke();
        ctx.fillStyle = '#6c5ce7';
        ctx.fillRect(-4, 4, 8, 12); ctx.fillRect(this.width-4, 4, 8, 12);
        ctx.restore();
    }
    drawReviewer() {
        ctx.save(); ctx.translate(this.x, this.y);
        // Body
        ctx.fillStyle = '#d63031';
        ctx.beginPath(); ctx.arc(this.width/2, 22, 19, 0, Math.PI*2); ctx.fill();
        // Face
        ctx.fillStyle = '#fdcb6e';
        ctx.beginPath(); ctx.arc(this.width/2, 22, 15, 0, Math.PI*2); ctx.fill();
        // Eyes
        ctx.fillStyle = '#2d3436';
        ctx.fillRect(this.width/2-7, 17, 3, 5);
        ctx.fillRect(this.width/2+4, 17, 3, 5);
        // Frown
        ctx.strokeStyle='#2d3436'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(this.width/2, 28, 7, Math.PI*0.1, Math.PI*0.9); ctx.stroke();
        // REJECT stamp
        ctx.fillStyle='#e00'; ctx.fillRect(this.width/2-18, 41, 36, 15);
        ctx.fillStyle='#fff'; ctx.font='bold 8px Courier New'; ctx.textAlign='center';
        ctx.fillText('REJECT', this.width/2, 52);
        ctx.restore();
    }
    draw() {
        if (this.type==='laptop')   this.drawLaptop();
        if (this.type==='cable')    this.drawCable();
        if (this.type==='reviewer') this.drawReviewer();
    }
}

// ═══════════════════════════════════════════════════════
//  CLOUD
// ═══════════════════════════════════════════════════════
class Cloud {
    constructor(startX) {
        this.w = 95 + Math.random()*65; this.h = 38 + Math.random()*22;
        this.x = startX !== undefined ? startX : canvas.width + Math.random()*60;
        this.y = Math.random() * (canvas.height*0.38 - this.h);
        this.spd = (Math.random()*0.4+0.08) * (currentSpeed*0.18);
        this.gone = false;
    }
    update() { this.x -= this.spd; if (this.x+this.w<0) this.gone=true; }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.fillStyle='#fff'; ctx.globalAlpha=0.78;
        ctx.beginPath();
        ctx.arc(this.w*0.2,  this.h*0.7,  this.h*0.3, Math.PI*0.5, Math.PI*1.5);
        ctx.arc(this.w*0.45, this.h*0.4,  this.h*0.4, Math.PI, Math.PI*2);
        ctx.arc(this.w*0.75, this.h*0.5,  this.h*0.3, Math.PI, Math.PI*2);
        ctx.arc(this.w*0.85, this.h*0.75, this.h*0.25,Math.PI*1.5,Math.PI*0.5);
        ctx.closePath(); ctx.fill(); ctx.restore();
    }
}

// ═══════════════════════════════════════════════════════
//  CONFERENCE VENUE
// ═══════════════════════════════════════════════════════
class ConferenceVenue {
    constructor() {
        this.width   = 220;
        this.height  = canvas.height * 0.55;
        this.groundY = canvas.height - CONFIG.groundHeight;
        this.x       = canvas.width + 250;
    }
    getBounds() {
        // Just the doorway as trigger zone
        return { x:this.x+this.width/2-35, y:this.groundY-75, w:70, h:75 };
    }
    update() { this.x -= currentSpeed; }
    draw() {
        const bx = this.x, bY = this.groundY - this.height;
        ctx.save();

        // Building body
        ctx.fillStyle = '#0d1f6e';
        ctx.fillRect(bx, bY, this.width, this.height);

        // Window grid
        for (let r=0; r<9; r++) {
            for (let c=0; c<4; c++) {
                const wx = bx+14 + c*48;
                const wy = bY+70 + r*30;
                if (wy > this.groundY - 80) continue;
                ctx.fillStyle = (Math.sin(frameCount*0.05+r*c)>0.9) ? '#fff59d' : '#42a5f5';
                ctx.fillRect(wx, wy, 28, 18);
            }
        }

        // Top banner
        ctx.fillStyle = '#003a8c';
        ctx.fillRect(bx-10, bY+22, this.width+20, 42);
        ctx.strokeStyle='#ffd700'; ctx.lineWidth=2;
        ctx.strokeRect(bx-10, bY+22, this.width+20, 42);

        ctx.fillStyle='#ffd700'; ctx.font='bold 14px Courier New';
        ctx.textAlign='center';
        ctx.fillText('IEEE CONFERENCE 2026', bx+this.width/2, bY+40);
        ctx.fillStyle='#90caf9'; ctx.font='10px Courier New';
        ctx.fillText('80th Anniversary Celebration', bx+this.width/2, bY+56);

        // Doorway
        ctx.fillStyle='#ffd700';
        ctx.fillRect(bx+this.width/2-28, this.groundY-72, 56, 72);
        ctx.fillStyle='#0d1f6e';
        ctx.fillRect(bx+this.width/2-23, this.groundY-68, 18, 68);
        ctx.fillRect(bx+this.width/2+5,  this.groundY-68, 18, 68);

        // 80 years badge
        ctx.fillStyle='#ffd700';
        ctx.beginPath(); ctx.arc(bx+30, bY+100, 26, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#0d1f6e';
        ctx.font='bold 12px Courier New'; ctx.textAlign='center';
        ctx.fillText('80',    bx+30, bY+97);
        ctx.font='6px Courier New';
        ctx.fillText('YEARS', bx+30, bY+108);

        // Stars
        ctx.font='18px serif';
        ctx.fillText('⭐', bx+15, bY+20);
        ctx.fillText('⭐', bx+this.width-10, bY+20);

        // Neon sign pulse
        const pulse = 0.7 + Math.sin(frameCount*0.1)*0.3;
        ctx.globalAlpha = pulse;
        ctx.fillStyle='#fff';
        ctx.font='bold 9px Courier New';
        ctx.fillText('ENTER →', bx+this.width/2, this.groundY-4);
        ctx.globalAlpha=1;

        ctx.restore();
    }
}

// Pre-generate deterministic building data
const BG_BUILDINGS = [];
for (let i = 0; i < 18; i++) {
    const hash = (i*137+41) % 100;
    BG_BUILDINGS.push({
        relX   : i * 220 + (hash * 1.3),
        width  : 60 + hash * 0.8,
        height : 90 + hash * 1.4,
        shade  : hash,
    });
}
const BG_PERIOD = 220 * 18;

function drawBackground() {
    const groundY = canvas.height - CONFIG.groundHeight;

    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, groundY);
    grad.addColorStop(0,   '#09122b');
    grad.addColorStop(0.5, '#0e3060');
    grad.addColorStop(1,   '#1565c0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, groundY);

    // Twinkling stars
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    for (let i = 0; i < 40; i++) {
        const sx = (i*173 + frameCount*0.08*((i%3)+1)) % canvas.width;
        const sy = (i*67) % (groundY*0.55);
        const r  = 0.8 + (Math.sin(frameCount*0.06+i)*0.5+0.5)*1.2;
        ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
    }

    // Parallax background buildings
    const bgOff = (gameDistance * 0.18) % BG_PERIOD;
    ctx.globalAlpha = 0.22;
    for (let rep = -1; rep <= Math.ceil(canvas.width / BG_PERIOD) + 1; rep++) {
        BG_BUILDINGS.forEach(b => {
            const bx = rep * BG_PERIOD + b.relX - bgOff;
            const bH = b.height * (canvas.height / 600);
            const bY = groundY - bH;
            ctx.fillStyle = `rgb(${10+b.shade/5},${20+b.shade/4},${80+b.shade/3})`;
            ctx.fillRect(bx, bY, b.width, bH);
            // Windows
            ctx.fillStyle = 'rgba(100,160,255,0.6)';
            for (let r=0; r<Math.floor(bH/20); r++)
                for (let c=0; c<Math.floor(b.width/16); c++)
                    ctx.fillRect(bx+4+c*15, bY+6+r*18, 9, 10);
        });
    }
    ctx.globalAlpha = 1;

    // IEEE CS 80th Anniversary banner
    drawAnniversaryBanner();
}

function drawAnniversaryBanner() {
    const bx = canvas.width - 225, by = 14;
    ctx.save();
    ctx.fillStyle = 'rgba(5,25,80,0.82)';
    rrect(bx, by, 210, 42, 8); ctx.fill();
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=1.8; ctx.stroke();
    ctx.fillStyle='#ffd700'; ctx.font='bold 11px Courier New'; ctx.textAlign='center';
    ctx.fillText('🎉 IEEE CS 80th Anniversary 🎉', bx+105, by+16);
    ctx.fillStyle='#90caf9'; ctx.font='8.5px Courier New';
    ctx.fillText('Est. 1946 — 80 Years of Computing!', bx+105, by+31);
    ctx.restore();
}

function drawGround() {
    const groundY = canvas.height - CONFIG.groundHeight;
    // Ground fill
    ctx.fillStyle = '#0a1520';
    ctx.fillRect(0, groundY, canvas.width, CONFIG.groundHeight);
    // Top trim
    ctx.fillStyle = '#00b894';
    ctx.fillRect(0, groundY, canvas.width, 4);
    // Circuit traces (scrolling)
    ctx.strokeStyle = 'rgba(0,184,148,0.35)'; ctx.lineWidth=1.5;
    const trOff = (gameDistance * 1) % 80;
    for (let x = -trOff; x < canvas.width + 80; x += 80) {
        ctx.beginPath();
        ctx.moveTo(x, groundY+20); ctx.lineTo(x+35, groundY+20);
        ctx.lineTo(x+35, groundY+38); ctx.lineTo(x+65, groundY+38);
        ctx.stroke();
        ctx.fillStyle='rgba(0,220,160,0.55)';
        ctx.beginPath(); ctx.arc(x+35, groundY+20, 3.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x+65, groundY+38, 3.5, 0, Math.PI*2); ctx.fill();
    }
}

    ctx.fillStyle=barC; ctx.fillRect(20, 40, 174*pct, 13);

    ctx.fillStyle = barC; ctx.font='bold 10px Courier New'; ctx.textAlign='right';

// ═══════════════════════════════════════════════════════
//  PUZZLE SYSTEM
// ═══════════════════════════════════════════════════════
function triggerPuzzle(idx) {
    currentPuzzle  = idx;
    puzzleAnswered = false;
    gameState      = 'puzzle';

    const p = PUZZLES[idx];
    document.getElementById('puzzle-title').textContent    = p.title;
    document.getElementById('puzzle-question').textContent = p.question;

    const opts = document.getElementById('puzzle-options');
    opts.innerHTML = '';
    p.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className   = 'puzzle-option';
        btn.textContent = opt;
        btn.onclick = () => answerPuzzle(i);
        opts.appendChild(btn);
    });
    document.getElementById('puzzle-feedback').textContent = '';
    document.getElementById('puzzle-continue').style.display = 'none';
    document.getElementById('puzzle-overlay').classList.add('active');
}

function answerPuzzle(idx) {
    if (puzzleAnswered) return;
    puzzleAnswered = true;
    const p   = PUZZLES[currentPuzzle];
    const btns = document.querySelectorAll('.puzzle-option');
    btns[p.answer].classList.add('correct');
    const fb = document.getElementById('puzzle-feedback');
    if (idx === p.answer) {
        if (idx !== p.answer) {} // no-op guard
        btns[idx].classList.add('correct');
        fb.textContent = p.reward; fb.style.color = '#66bb6a';
        timer          += p.bonusTime;
        pagesCollected  = Math.min(CONFIG.totalPages, pagesCollected + p.bonusPage);
        floatTexts.push(new FloatText(player.x+50, player.y-30,
            `+${p.bonusTime}s BONUS!`, '#00e5ff'));
        if (p.bonusPage > 0)
            floatTexts.push(new FloatText(player.x+50, player.y-55,
                `+${p.bonusPage} PAGES!`, '#ffd700'));
    } else {
        btns[idx].classList.add('wrong');
        fb.textContent = '❌ Wrong answer. No bonus awarded.'; fb.style.color='#ef5350';
    }
    document.getElementById('puzzle-continue').style.display='inline-block';
}

function closePuzzle() {
    document.getElementById('puzzle-overlay').classList.remove('active');
    gameState = 'playing';
}

// ═══════════════════════════════════════════════════════
//  SPAWNING
// ═══════════════════════════════════════════════════════
function spawnEntities() {
    if (frameCount % 310 === 0) clouds.push(new Cloud());

    // Pages evenly across confDist
    const pageInterval = CONFIG.confDist / CONFIG.totalPages;
    const nextDist     = (pagesSpawned + 1) * pageInterval;
    if (pagesSpawned < CONFIG.totalPages && gameDistance >= nextDist) {
        pages.push(new Page());
        pagesSpawned++;
    }

    // Obstacles every ~2 seconds
    if (gameDistance > 300 && frameCount % 125 === 0) {
        const types = ['laptop','cable','reviewer'];
        obstacles.push(new Obstacle(types[Math.floor(Math.random()*types.length)]));
    }
}

function checkPuzzles() {
    if (!puzzle1Done && gameDistance >= CONFIG.puzzle1Dist) {
        puzzle1Done = true; triggerPuzzle(0);
    }
    if (!puzzle2Done && gameDistance >= CONFIG.puzzle2Dist) {
        puzzle2Done = true; triggerPuzzle(1);
    }
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function initGame() {
    resizeCanvas();
    player         = new Player();
    clouds         = [];
    particles      = [];
    pages          = [];
    obstacles      = [];
    floatTexts     = [];
    pagesCollected = 0;
    pagesSpawned   = 0;
    gameDistance   = 0;
    puzzle1Done    = false;
    puzzle2Done    = false;
    confActivated  = false;
    confReached    = false;
    timer          = CONFIG.gameTime;
    lastTime       = null;
    frameCount     = 0;
    currentSpeed   = CONFIG.baseSpeed;
    venue          = null;

    for (let i = 0; i < 3; i++) clouds.push(new Cloud(Math.random()*canvas.width));
}

// ═══════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════
function gameLoop(ts) {
    if (lastTime === null) lastTime = ts;
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ── Non-playing states ──
    if (gameState === 'start') {
        drawBackground(); clouds.forEach(c=>{ c.update(); c.draw(); }); drawGround();
        drawStartScreen(); frameCount++;
        requestAnimationFrame(gameLoop); return;
    }
    if (gameState === 'end') {
        drawBackground(); drawGround();
        if (venue) venue.draw();
        player.draw(); drawEndScreen();
        frameCount++;
        requestAnimationFrame(gameLoop); return;
    }
    if (gameState === 'gameover') {
        drawBackground(); drawGround(); player.draw();
        drawGameOverScreen(); frameCount++;
        requestAnimationFrame(gameLoop); return;
    }
    if (gameState === 'puzzle') {
        // Freeze world, still render
        drawBackground(); clouds.forEach(c=>c.draw()); drawGround();
        pages.forEach(p=>p.draw()); obstacles.forEach(o=>o.draw());
        if (venue) venue.draw();
        player.draw(); drawHUD();
        frameCount++;
        requestAnimationFrame(gameLoop); return;
    }

    // ── PLAYING ──
    timer        -= dt;
    gameDistance += currentSpeed;

    // Ramp speed
    const elapsed  = CONFIG.gameTime - timer;
    currentSpeed   = CONFIG.baseSpeed + elapsed * CONFIG.speedRamp;

    // Timer expired
    if (timer <= 0) { timer=0; gameState='gameover'; requestAnimationFrame(gameLoop); return; }

    // Activate conference venue
    if (!confActivated && gameDistance >= CONFIG.confDist) {
        confActivated = true;
        venue = new ConferenceVenue();
    }

    checkPuzzles();
    spawnEntities();

    // Update
    clouds.forEach(c=>c.update());     clouds    = clouds.filter(c=>!c.gone);
    particles.forEach(p=>p.update());  particles = particles.filter(p=>!p.gone);
    pages.forEach(p=>p.update());      pages     = pages.filter(p=>!p.gone);
    obstacles.forEach(o=>o.update());  obstacles = obstacles.filter(o=>!o.gone);
    floatTexts.forEach(t=>t.update()); floatTexts= floatTexts.filter(t=>!t.gone);
    if (venue) venue.update();
    player.update();

    // ── Collision: pages ──
    const pb = player.getBounds();
    pages.forEach(pg => {
        if (!overlap(pb, pg.getBounds())) return;
        pg.gone = true; pagesCollected++;
        floatTexts.push(new FloatText(pg.x+13, pg.y-8, '+1 PAGE!', '#ffd700'));
        for (let i=0;i<10;i++)
            particles.push(new Particle(pg.x+13, pg.y+17,
                (Math.random()-0.5)*6, -Math.random()*4-1,
                Math.random()*4+2, '#ffd700'));
    });

    // ── Collision: obstacles ──
    if (player.invTimer === 0) {
        obstacles.forEach(ob => {
            if (!overlap(pb, ob.getBounds())) return;
            ob.gone = true;
            player.vy = CONFIG.jumpForce * 0.45;
            player.x -= 20; player.invTimer = 60;
            const lbl = ob.type==='reviewer' ? 'REJECTED! -1 📄' : 'OUCH! -1 📄';
            floatTexts.push(new FloatText(player.x+30, player.y-25, lbl, '#ff4444'));
            if (pagesCollected > 0) pagesCollected--;
        });
    }

    // ── Collision: conference venue (doorway) ──
    if (venue && !confReached) {
        if (overlap(pb, venue.getBounds())) {
            confReached = true; gameState = 'end';
        }
    }

    // ── Draw ──
    drawBackground();
    clouds.forEach(c=>c.draw()); drawGround();
    pages.forEach(p=>p.draw()); obstacles.forEach(o=>o.draw());
    if (venue) venue.draw();
    particles.forEach(p=>p.draw());
    player.draw();
    floatTexts.forEach(t=>t.draw());
    drawMobileControls(); drawHUD();

    frameCount++;
    requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════
//  INPUT HANDLERS
// ═══════════════════════════════════════════════════════
window.addEventListener('keydown', e => {
    if (keys.hasOwnProperty(e.code)) { keys[e.code]=true; e.preventDefault(); }
    if (gameState==='start' && (e.code==='Space'||e.code==='Enter'||e.code==='ArrowUp'))
        startGame();
});
window.addEventListener('keyup', e => {
    if (keys.hasOwnProperty(e.code)) keys[e.code]=false;
});

canvas.addEventListener('click', e => {
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width, sy=canvas.height/r.height;
    const cx=(e.clientX-r.left)*sx, cy=(e.clientY-r.top)*sy;

    if (gameState==='start') {
        const bx=canvas.width/2-106, by=canvas.height*0.84-23;
        if (cx>=bx&&cx<=bx+212&&cy>=by&&cy<=by+46) startGame();
    }
    if (gameState==='end'||gameState==='gameover') {
        const bx=canvas.width/2-112, by=canvas.height*0.75-23;
        if (cx>=bx&&cx<=bx+224&&cy>=by&&cy<=by+46) restartGame();
    }
});

window.addEventListener('touchstart', e => {
    e.preventDefault();
    if (gameState==='start')   { startGame(); return; }
    if (gameState==='end'||gameState==='gameover') { restartGame(); return; }
    for (let i=0;i<e.changedTouches.length;i++) {
        const x=e.changedTouches[i].clientX, y=e.changedTouches[i].clientY;
        if (y > canvas.height-90) {
            if (x<95)                       keys.ArrowLeft=true;
            else if (x>=95&&x<=180)         keys.ArrowRight=true;
            else if (x>canvas.width-100)    keys.Space=true;
        } else { keys.Space=true; }
    }
}, {passive:false});

window.addEventListener('touchend', e => {
    if (e.touches.length===0) {
        keys.ArrowLeft=false; keys.ArrowRight=false; keys.Space=false;
    }
}, {passive:false});

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
function startGame()   { initGame(); gameState='playing'; }
function restartGame() { initGame(); gameState='playing'; }

resizeCanvas();
initGame();
gameState = 'start';
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
